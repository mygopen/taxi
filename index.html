<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>敬老卡叫車小幫手</title>
    
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/mygopen/icons/taxi.png?v=7">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/mygopen/icons/taxi.png?v=7">
    <link rel="manifest" href="manifest.json?v=7">
    
    <meta name="theme-color" content="#3B82F6">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F3F4F6;
            --brand-primary: #3B82F6;   
            --brand-secondary: #10B981; 
            --brand-accent: #8B5CF6;    
            --brand-orange: #F59E0B; /* 用於「其他地方」按鈕 */
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --border-subtle: #E5E7EB;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --font-sans: 'Inter', "PingFang TC", "Microsoft JhengHei", sans-serif;
            --transition-fast: all 0.2s ease;
        }

        body { font-family: var(--font-sans); background-color: var(--bg-secondary); color: var(--text-primary); margin: 0; padding: 12px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 28px; font-weight: 800; text-align: center; line-height: 1.3; margin: 10px 0; letter-spacing: -0.02em; }
        .page { display: none; width: 100%; max-width: 450px; flex-direction: column; align-items: center; }
        .page.active { display: flex; }
        
        .hero-banner { width: 100%; margin-bottom: 20px; object-fit: cover; background-color: transparent; border: none; box-shadow: none; }
        
        .saas-btn { width: 100%; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); font-size: 30px; font-weight: 800; padding: 20px 15px; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; margin-bottom: 15px; border: none; transition: var(--transition-fast); -webkit-tap-highlight-color: transparent; color: #FFFFFF; }
        .saas-btn:active { transform: translateY(2px); box-shadow: var(--shadow-sm); }
        .saas-btn:disabled { background-color: #9CA3AF; cursor: not-allowed; opacity: 0.7; }

        .btn-home { background-color: var(--brand-primary); }
        .btn-hospital { background-color: var(--brand-secondary); }
        .btn-church { background-color: var(--brand-accent); }
        .btn-gps { background-color: var(--brand-orange); } /* 其他地方按鈕顏色 */
        
        .btn-call { background-color: var(--brand-secondary); font-size: 34px; padding: 22px; margin-top: 5px; border-radius: var(--radius-full); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }
        .btn-back { background-color: var(--bg-primary); color: var(--text-secondary); border: 1px solid var(--border-subtle); font-size: 20px; padding: 14px; margin-top: 10px; width: 80%; box-shadow: var(--shadow-sm); }

        .icon { font-size: 36px; margin-right: 15px; }

        .saas-card { background-color: var(--bg-primary); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-lg); border-radius: var(--radius-lg); padding: 20px; width: 100%; box-sizing: border-box; text-align: center; margin-bottom: 15px; }
        .prompt-hint { font-size: 22px; font-weight: 800; color: var(--brand-primary); background-color: #EFF6FF; padding: 10px 15px; margin-bottom: 15px; border-radius: var(--radius-md); display: inline-block; }
        .prompt-text { font-size: 32px; font-weight: 800; line-height: 1.5; color: var(--text-primary); }
        .highlight-text { color: var(--brand-primary); border-bottom: 3px solid var(--brand-primary); }
        .address-text { display: inline-block; margin-top: 10px; color: var(--brand-accent); border-bottom: 3px dashed var(--border-subtle); }

        .card-reminder { background-color: #F8FAFC; color: var(--text-secondary); border: 1px solid var(--border-subtle); border-left: 5px solid var(--brand-primary); box-shadow: var(--shadow-sm); font-size: 20px; font-weight: 600; padding: 15px; width: 100%; box-sizing: border-box; text-align: center; margin-bottom: 15px; border-radius: var(--radius-md); }

        .instruction-box { background-color: #EFF6FF; border: 1px solid #BFDBFE; border-radius: var(--radius-lg); padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 10px; text-align: left; }
        .instruction-box p { margin: 0 0 8px 0; font-weight: 800; color: var(--brand-primary); font-size: 20px; display: flex; align-items: center; }
        .instruction-box ol { margin: 0; padding-left: 24px; color: var(--text-secondary); font-weight: 600; font-size: 18px; line-height: 1.5; }
        
        /* 載入中動畫 */
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="page-select" class="page active">
        <img src="https://ik.imagekit.io/mygopen/taxi-banner.png" alt="叫車服務" class="hero-banner">
        <h1>您現在人在哪裡？</h1>
        
        <div class="saas-btn btn-home" onclick="showPrompt('新竹市北區武陵路175巷10號')">
            <span class="icon">🏠</span> 我在【家】
        </div>
        <div class="saas-btn btn-hospital" onclick="showPrompt('新竹市東區光復路二段690號')">
            <span class="icon">🏥</span> 我在【醫院】
        </div>
        <div class="saas-btn btn-church" onclick="showPrompt('新竹市東區東門街43號')">
            <span class="icon">⛪</span> 我在【教會】
        </div>

        <button id="gps-btn" class="saas-btn btn-gps" onclick="getCurrentLocation()">
            <span class="icon">📍</span> 我在【其他地方】
        </button>
    </div>

    <div id="page-prompt" class="page">
        <div class="saas-card">
            <div class="prompt-hint">接通後會<span style="color:#10B981;">自動幫您按 9</span> 轉接<br>請直接對客服唸出：</div>
            <div class="prompt-text">
                「我要叫<span class="highlight-text">敬老車</span>」<br>
                我現在人在：<br>
                <span id="display-address" class="address-text">正在讀取地址...</span>
            </div>
        </div>

        <div class="card-reminder">
            💳 下車記得拿【敬老卡】刷卡<br>
            <span style="font-size: 16px; font-weight: 400;">(新竹市補助 100 點)</span>
        </div>

        <div class="instruction-box">
            <p>💡 撥號後怎麼看地址？</p>
            <ol>
                <li>接通後，先按下手機的<strong>「擴音」</strong></li>
                <li>切換視窗，<strong>回到這個畫面</strong>照著唸</li>
            </ol>
        </div>

        <a href="tel:55688,,9" class="saas-btn btn-call">
            <span class="icon">📞</span> 打給 55688
        </a>

        <div class="saas-btn btn-back" onclick="goBack()">
            🔙 選錯了，回上一頁
        </div>
    </div>

    <script>
        function showPrompt(address) {
            document.getElementById('display-address').innerText = address;
            document.getElementById('page-select').classList.remove('active');
            document.getElementById('page-prompt').classList.add('active');
            window.scrollTo(0, 0);
        }

        function goBack() {
            document.getElementById('page-prompt').classList.remove('active');
            document.getElementById('page-select').classList.add('active');
        }

        // GPS 定位功能
        function getCurrentLocation() {
            const gpsBtn = document.getElementById('gps-btn');
            const originalContent = gpsBtn.innerHTML;
            
            // 檢查瀏覽器是否支援定位
            if (!navigator.geolocation) {
                alert("您的手機不支援 GPS 定位功能。");
                return;
            }

            // 顯示載入狀態
            gpsBtn.disabled = true;
            gpsBtn.innerHTML = '<span class="spinner"></span> 正在定位中...';

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    try {
                        // 使用 OpenStreetMap Nominatim API 進行逆地理編碼 (Reverse Geocoding)
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1&accept-language=zh-TW`);
                        const data = await response.json();
                        
                        // 取得格式化後的地址，若無則顯示座標
                        const address = data.display_name || `經度:${lat.toFixed(4)}, 緯度:${lon.toFixed(4)}`;
                        
                        // 清理地址文字 (Nominatim 的地址通常很長，我們嘗試簡化它)
                        const cleanAddress = address.split(',').reverse().slice(1).reverse().join('').trim() || address;
                        
                        showPrompt(cleanAddress);
                    } catch (error) {
                        console.error("地址轉換失敗:", error);
                        showPrompt(`座標: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);
                    } finally {
                        gpsBtn.disabled = false;
                        gpsBtn.innerHTML = originalContent;
                    }
                },
                (error) => {
                    gpsBtn.disabled = false;
                    gpsBtn.innerHTML = originalContent;
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            alert("請允許 App 使用您的位置資訊。");
                            break;
                        case error.POSITION_UNAVAILABLE:
                            alert("無法取得位置資訊。");
                            break;
                        case error.TIMEOUT:
                            alert("定位逾時，請再試一次。");
                            break;
                        default:
                            alert("發生未知錯誤。");
                    }
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=7').catch(err => {});
            });
        }
    </script>

</body>
</html>
