<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>敬老卡叫車小幫手</title>
    
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/mygopen/icons/taxi.png?v=3">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/mygopen/icons/taxi.png?v=3">
    <link rel="manifest" href="manifest.json?v=3">
    
    <meta name="theme-color" content="#3B82F6">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           Startup Vibrant (S25) Design Tokens 
           ========================================= */
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F3F4F6;
            
            /* 活力新創品牌色 */
            --brand-primary: #3B82F6;   /* 活力藍 */
            --brand-secondary: #10B981; /* 成長綠 */
            --brand-accent: #8B5CF6;    /* 科技紫 */
            
            --text-primary: #111827;
            --text-secondary: #4B5563;
            
            --border-subtle: #E5E7EB;
            
            /* 圓角與陰影 (科技感軟性視覺) */
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --font-sans: 'Inter', "PingFang TC", "Microsoft JhengHei", sans-serif;
            --transition-fast: all 0.2s ease;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 標題樣式 */
        h1 {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            line-height: 1.3;
            margin: 10px 0;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        /* 頁面容器 */
        .page {
            display: none;
            width: 100%;
            max-width: 450px;
            flex-direction: column;
            align-items: center;
        }
        .page.active { display: flex; }

        /* 首頁 Banner 圖片 (S25 風格) */
        .hero-banner {
            width: 100%;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
            background-color: var(--bg-primary);
            object-fit: cover;
            border: 1px solid var(--border-subtle);
        }
        
        /* === SaaS 現代感按鈕共用樣式 === */
        .saas-btn {
            width: 100%;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            font-size: 30px;
            font-weight: 800;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-bottom: 15px;
            border: none;
            transition: var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
            color: #FFFFFF;
        }
        
        /* 充滿活力的懸停與點擊反饋 */
        .saas-btn:active {
            transform: translateY(2px);
            box-shadow: var(--shadow-sm);
        }

        /* 個別地點按鈕顏色配置 (SaaS 活力漸層感/純色) */
        .btn-home { background-color: var(--brand-primary); }
        .btn-hospital { background-color: var(--brand-secondary); }
        .btn-church { background-color: var(--brand-accent); }
        
        .btn-call { 
            background-color: var(--brand-secondary); 
            font-size: 34px; 
            padding: 22px;
            margin-top: 15px;
            border-radius: var(--radius-full); /* 撥打按鈕用全圓角增加轉換率暗示 */
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); /* 帶有綠色的發光陰影 */
        }
        
        .btn-back {
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            font-size: 20px;
            padding: 14px;
            margin-top: 10px;
            width: 80%;
            box-shadow: var(--shadow-sm);
        }

        .icon { font-size: 36px; margin-right: 15px; }

        /* === 提詞機視窗 (科技感現代卡片) === */
        .saas-card {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-lg);
            border-radius: var(--radius-lg);
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 15px;
        }

        .prompt-hint {
            font-size: 22px;
            font-weight: 800;
            color: var(--brand-primary);
            background-color: #EFF6FF; /* 極淺的藍色背景 */
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: var(--radius-md);
            display: inline-block;
        }

        .prompt-text {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .highlight-text {
            color: var(--brand-primary);
            border-bottom: 3px solid var(--brand-primary);
        }

        .address-text {
            display: inline-block;
            margin-top: 10px;
            color: var(--brand-accent);
            border-bottom: 3px dashed var(--border-subtle);
        }

        /* 敬老卡提醒區塊 (柔和科技感) */
        .card-reminder {
            background-color: #F8FAFC;
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            border-left: 5px solid var(--brand-primary); /* 左側色彩強調線 */
            box-shadow: var(--shadow-sm);
            font-size: 20px;
            font-weight: 600;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 10px;
            border-radius: var(--radius-md);
        }
    </style>
</head>
<body>

    <div id="page-select" class="page active">
        
        <img src="https://ik.imagekit.io/mygopen/taxi-banner.png" alt="叫車服務" class="hero-banner">

        <h1>您現在人在哪裡？</h1>

        <div class="saas-btn btn-home" onclick="showPrompt('新竹市北區武陵路175巷10號')">
            <span class="icon">🏠</span> 我在【家】
        </div>

        <div class="saas-btn btn-hospital" onclick="showPrompt('新竹市東區光復路二段690號')">
            <span class="icon">🏥</span> 我在【醫院】
        </div>

        <div class="saas-btn btn-church" onclick="showPrompt('新竹市東區東門街43號')">
            <span class="icon">⛪</span> 我在【教會】
        </div>
    </div>

    <div id="page-prompt" class="page">
        
        <div class="saas-card">
            <div class="prompt-hint">接通後按【9】並唸出：</div>
            <div class="prompt-text">
                「我要叫<span class="highlight-text">敬老車</span>」<br>
                我現在人在：<br>
                <span id="display-address" class="address-text"></span>
            </div>
        </div>

        <div class="card-reminder">
            💳 下車記得拿【敬老卡】刷卡<br>
            <span style="font-size: 16px; font-weight: 400;">(新竹市補助 100 點)</span>
        </div>

        <a href="tel:55688" class="saas-btn btn-call">
            <span class="icon">📞</span> 打給 55688
        </a>

        <div class="saas-btn btn-back" onclick="goBack()">
            🔙 選錯了，回上一頁
        </div>
    </div>

    <script>
        function showPrompt(address) {
            document.getElementById('display-address').innerText = address;
            document.getElementById('page-select').classList.remove('active');
            document.getElementById('page-prompt').classList.add('active');
            window.scrollTo(0, 0);
        }

        function goBack() {
            document.getElementById('page-prompt').classList.remove('active');
            document.getElementById('page-select').classList.add('active');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=3').catch(err => {});
            });
        }
    </script>

</body>
</html>
